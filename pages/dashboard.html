<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Valentine – Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>💝</text></svg>"/>
  <style>
    .dash { max-width:620px; margin:0 auto; padding:32px 16px; width:100%; }
    .dash-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .dash-head h1 { font-family:'Dancing Script',cursive; color:#c2185b; font-size:1.9rem; }
    .signout-btn { background:transparent; border:1.5px solid #f48fb1; color:#c2185b; border-radius:10px; padding:7px 16px; font-size:0.82rem; font-family:'Dancing Script',cursive; font-weight:600; }
    .create-btn { width:100%; padding:18px; border-radius:20px; background:linear-gradient(135deg,#e91e8c,#c2185b); color:#fff; font-size:1.2rem; font-family:'Dancing Script',cursive; font-weight:700; border:none; box-shadow:0 6px 20px rgba(233,30,140,0.3); margin-bottom:28px; transition:transform 0.15s; }
    .create-btn:hover { transform:translateY(-2px); }
    .card-item { background:rgba(255,255,255,0.9); border-radius:18px; padding:18px 22px; border:1px solid rgba(255,182,193,0.4); box-shadow:0 4px 16px rgba(220,38,100,0.1); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
    .card-item h3 { font-family:'Dancing Script',cursive; color:#c2185b; font-size:1.2rem; }
    .card-item p  { font-size:0.78rem; color:#ad1457; margin-top:2px; }
    .item-btns { display:flex; gap:8px; }
    .view-btn { background:#c2185b; color:#fff; border:none; border-radius:9px; padding:7px 16px; font-size:0.82rem; font-family:'Dancing Script',cursive; font-weight:600; }
    .copy-btn { background:transparent; border:1.5px solid #f48fb1; color:#c2185b; border-radius:9px; padding:7px 14px; font-size:0.82rem; font-family:'Dancing Script',cursive; }
    .delete-btn { background:transparent; border:1.5px solid #ef9a9a; color:#e53935; border-radius:9px; padding:7px 11px; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .delete-btn:hover { background:#ffebee; }
    .empty { text-align:center; padding:40px 0; color:#f48fb1; font-family:'Dancing Script',cursive; font-size:1.2rem; }
  </style>
</head>
<body>
<div class="hearts-bg"></div>
<div class="page-wrap" style="justify-content:flex-start; padding-top:40px;">
  <div class="dash" style="position:relative;z-index:1;">
    <div class="dash-head">
      <div>
        <h1>💌 My Valentines</h1>
        <span id="welcome" style="font-size:0.85rem; color:#ad1457;"></span>
      </div>
      <button class="signout-btn" onclick="doSignout()">Sign out</button>
    </div>
    <button class="create-btn" onclick="window.location.href='create.html'">+ Create a New Valentine Card 💕</button>
    <div id="cardsList"><div class="loader">Loading... 💝</div></div>
  </div>
</div>

<script type="module">
  import { initHearts } from '../js/hearts.js';
  import { auth, db } from '../js/firebase-config.js';
  import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { collection, query, where, getDocs, doc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  initHearts();

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href='../index.html'; return; }
    const snap = await getDoc(doc(db,'users',user.uid));
    const name = snap.exists() ? snap.data().username : user.email;
    document.getElementById('welcome').textContent = `Welcome back, ${name} 🌹`;

    const q = query(collection(db,'valentines'), where('creatorUid','==',user.uid));
    const cards = await getDocs(q);
    const list = document.getElementById('cardsList');
    if (cards.empty) { list.innerHTML='<div class="empty">No cards yet. Create your first one! 💕</div>'; return; }
    list.innerHTML='';
    cards.forEach(ds => {
      const d = ds.data(); const id = ds.id;
      const base = window.location.origin + window.location.pathname.replace('pages/dashboard.html','');
      const link = `${base}pages/valentine.html?id=${id}`;
      const el = document.createElement('div');
      el.className='card-item';
      el.innerHTML=`
        <div>
          <h3>💝 For ${d.partnerName||'My Love'}</h3>
          <p>Created ${new Date(d.createdAt).toLocaleDateString()}</p>
        </div>
        <div class="item-btns">
          <button class="view-btn" onclick="window.open('${link}','_blank')">View 🌹</button>
          <button class="copy-btn" onclick="copyIt('${link}',this)">Copy Link</button>
          <button class="delete-btn" onclick="deleteCard('${id}', this)" title="Delete">🗑️</button>
        </div>`;
      list.appendChild(el);
    });
  });

  window.doSignout = async () => { await signOut(auth); window.location.href='../index.html'; };
  window.copyIt = (link,btn) => { navigator.clipboard.writeText(link).then(()=>{ btn.textContent='Copied! ✓'; setTimeout(()=>btn.textContent='Copy Link',2000); }); };
  window.deleteCard = async (cardId, btn) => {
    if (!confirm('Delete this Valentine card? This cannot be undone. 💔')) return;
    const card = btn.closest('.card-item');
    btn.textContent = '...';
    try {
      await deleteDoc(doc(db, 'valentines', cardId));
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.95)';
      setTimeout(() => {
        card.remove();
        if (!document.querySelector('.card-item')) {
          document.getElementById('cardsList').innerHTML = '<div class="empty">No cards yet. Create your first one! 💕</div>';
        }
      }, 300);
    } catch (e) {
      alert('Could not delete: ' + e.message);
      btn.textContent = '🗑️';
    }
  };
</script>
</body>
</html>
